name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 复制 web 文件到 assets
        run: |
          mkdir -p app/src/main/assets
          cp index.html app/src/main/assets/
          cp manifest.json app/src/main/assets/
          cp sw.js app/src/main/assets/
          cp -r css app/src/main/assets/
          cp -r js app/src/main/assets/
          cp -r icons app/src/main/assets/

      - name: 生成 Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: cadence-apk
          path: app/build/outputs/apk/debug/app-debug.apk
