<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#5B9BD5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cadence</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-title" content="Cadence">
</head>
<body>

  <!-- ==================== 顶部标题栏 ==================== -->
  <header class="app-header">
    <button class="btn-tutorial-header" id="btn-tutorial" title="健身动作教程">📖</button>
    <h1 class="app-title">🏋️ Cadence</h1>
    <button class="btn-theme" id="btn-theme" title="更换背景">🎨</button>
  </header>

  <!-- ==================== 主内容区（三个板块） ==================== -->
  <main class="app-main">

    <!-- 板块①：日历封面页 -->
    <section id="panel-calendar" class="panel active">
      <!-- 月份切换栏 -->
      <div class="calendar-header">
        <button class="btn-icon" id="cal-prev-month" title="上个月">◀</button>
        <span class="calendar-month-label" id="cal-month-label">2026年 5月</span>
        <button class="btn-icon" id="cal-next-month" title="下个月">▶</button>
      </div>

      <!-- 星期表头 -->
      <div class="calendar-weekdays">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>

      <!-- 日期网格 -->
      <div class="calendar-grid" id="calendar-grid">
        <!-- 由 JS 动态渲染 -->
      </div>

      <!-- 日期详情展开区 -->
      <div class="calendar-detail" id="calendar-detail">
        <div class="detail-header">
          <span class="detail-date" id="detail-date">选择日期查看计划</span>
        </div>
        <ul class="detail-tasks" id="detail-tasks">
          <!-- 由 JS 动态渲染 -->
        </ul>
        <button class="btn-add" id="btn-add-task">+ 添加健身计划</button>
        <button class="btn-add" id="btn-add-activity">+ 添加活动</button>
      </div>
    </section>

    <!-- 板块③：纪念日倒计时 -->
    <section id="panel-countdown" class="panel">
      <!-- 倒计时列表 -->
      <div class="countdown-list" id="countdown-list">
        <!-- 由 JS 动态渲染 -->
        <div class="empty-state">
          <span class="empty-icon">💝</span>
          <p>还没有纪念日</p>
          <p class="empty-hint">点击下方按钮添加你的第一个纪念日吧</p>
        </div>
      </div>

      <!-- 新建按钮 -->
      <button class="btn-add" id="btn-add-countdown">+ 添加纪念日</button>

      <!-- ===== 分隔线 ===== -->
      <div class="section-divider"></div>

      <!-- ===== 心得区域 ===== -->
      <div class="notes-section" id="notes-section">
        <div class="notes-section-header">
          <span>📝 心得记录</span>
        </div>
        <div class="notes-search-wrapper">
          <input type="text" class="notes-search-input" id="notes-search-input"
                 placeholder="🔍 搜索心得...">
        </div>
        <div class="notes-list" id="notes-list">
          <!-- NotesModule 动态渲染 -->
        </div>
        <button class="btn-add" id="btn-add-note">+ 写心得</button>
      </div>
    </section>

    <!-- 板块②：日程 — 环形时间轴 -->
    <section id="panel-timeline" class="panel">

      <!-- ===== 日期导航 ===== -->
      <div class="timeline-dates-wrapper">
        <div class="timeline-dates" id="timeline-dates">
          <!-- 由 JS 动态渲染 -->
        </div>
        <button class="btn-today" id="btn-today">今天</button>
      </div>

      <!-- ===== 环形时间轴（SVG） ===== -->
      <div class="timeline-ring-wrapper" id="timeline-ring-wrapper">
        <svg class="timeline-ring-svg" id="timeline-ring-svg"
             viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
          <!-- TimelineModule 动态渲染 -->
        </svg>
      </div>

      <!-- ===== 操作按钮 ===== -->
      <button class="btn-add" id="btn-add-entry">+ 添加活动</button>

    </section>

  </main>

  <!-- ==================== 底部 Tab 导航 ==================== -->
  <nav class="tab-bar">
    <button class="tab-item active" data-panel="panel-calendar">
      <span class="tab-icon">📅</span>
      <span class="tab-label">日历</span>
    </button>
    <button class="tab-item" data-panel="panel-timeline">
      <span class="tab-icon">🕐</span>
      <span class="tab-label">日程</span>
    </button>
    <button class="tab-item" data-panel="panel-countdown">
      <span class="tab-icon">💝</span>
      <span class="tab-label">纪念日</span>
    </button>
  </nav>

  <!-- ==================== 通用弹窗（添加/编辑用） ==================== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content" id="modal-content">
      <!-- 由各模块动态填充 -->
    </div>
  </div>

  <!-- ==================== 脚本加载 ==================== -->
  <script src="js/storage.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/tutorials.js"></script>
  <script src="js/activities.js"></script>
  <script src="js/lunar.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
